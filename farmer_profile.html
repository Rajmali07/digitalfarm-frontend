<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Profile | Digital Farm</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="api_cache.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #22c55e;
      --bg-slate: #f8fafc;
      --text-dark: #0f172a;
      --text-gray: #64748b;
      --border-color: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-slate); color: var(--text-dark); }

    /* NAVBAR - Matching Image 509a02 */
    .navbar {
      background: #0f172a; position: sticky; top: 0; z-index: 1000;
      padding: 15px 60px; display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo { font-size: 22px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-links { display: flex; list-style: none; align-items: center; gap: 10px; }
    .nav-links a { text-decoration: none; color: #94a3b8; font-size: 14px; padding: 8px 20px; transition: 0.3s; }
    .nav-links a.active { background: rgba(255, 255, 255, 0.1); color: white; border-radius: 50px; font-weight: 600; }
    .profile-menu { position: relative; margin-left: 18px; }
    .profile-trigger { display: flex; align-items: center; gap: 14px; background: transparent; border: none; color: white; cursor: pointer; padding: 0; }
    .profile-name { font-size: 16px; font-weight: 600; color: #f8fafc; }
    .profile-avatar-small {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.04);
    }
    .profile-dropdown {
      position: absolute;
      top: calc(100% + 18px);
      right: 0;
      width: 270px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      border: 1px solid #e5e7eb;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      z-index: 1200;
    }
    .profile-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-item {
      display: block;
      width: 100%;
      padding: 18px 22px;
      background: #ffffff;
      border: none;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
      cursor: pointer;
      text-decoration: none;
      opacity: 1;
    }
    .dropdown-item:hover { background: #f8fafc; color: #0f172a; }
    .dropdown-item.logout { color: #dc2626; border-bottom: none; }

    /* PROFILE CONTAINER - Matching Image 51fdee */
    .container { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .page-title { font-size: 28px; font-weight: 700; color: var(--text-dark); }
    
    .btn-edit { 
        background: var(--primary); color: white; border: none; padding: 10px 20px; 
        border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
    }

    .profile-card {
      background: white; border-radius: 16px; padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border-color);
    }

    .user-info-section { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
    .profile-avatar {
      width: 150px; height: 150px; border-radius: 50%;
      border: 4px solid var(--primary); padding: 5px; object-fit: cover;
    }

    .user-meta h2 { font-size: 32px; font-weight: 800; color: var(--text-dark); }
    .user-meta p { color: var(--text-gray); font-size: 15px; margin-top: 5px; }
    .farmer-id-tag { font-weight: 600; color: #475569; }

    /* GRID FORM FIELDS */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 30px; border-top: 1px solid #f1f5f9; padding-top: 30px; }
    .full-width { grid-column: span 2; }

    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-group label { font-size: 13px; font-weight: 600; color: var(--text-gray); }
    
    .data-box {
      background: #f8fafc; padding: 14px 18px; border-radius: 10px;
      border: 1px solid #f1f5f9; font-size: 15px; color: #334155; font-weight: 500;
    }

    .risk-indicator {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
        background: #fff7ed; color: #9a3412; border: 1px solid #ffedd5;
    }

    /* FOOTER - Matching Image 509da4 */
    .footer { background: #020617; padding: 60px 80px 20px; color: #94a3b8; margin-top: 80px; border-top: 1px solid #1e293b; }
    .footer-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; }
    .footer h3 { color: white; margin-bottom: 20px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .footer-logo { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
    .footer a { text-decoration: none; color: #94a3b8; font-size: 14px; }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="farmer_dashboard.html" class="nav-logo"><i class="fa-solid fa-leaf"></i> Digital Farm</a>
    <ul class="nav-links">
      <li><a href="farmer_dashboard.html">Dashboard</a></li>
      <li><a href="farmer_ai_check.html">AI Diagnostic</a></li>
      <li><a href="farmer_add_data.html">Data Entry</a></li>
      <li><a href="farmer_animal_records.html">Records</a></li>
      <li><a href="farmer_biosecurity.html">Biosecurity</a></li>
      <li><a href="farmer_profile.html" class="active">Profile</a></li>
      <li class="profile-menu">
        <button class="profile-trigger" id="profileMenuButton" type="button">
          <span class="profile-name">Hello, Raj!</span>
          <span class="profile-avatar-small">R</span>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <a href="farmer_profile.html" class="dropdown-item">View Profile</a>
          <a href="farmer_setting.html" class="dropdown-item">Settings</a>
          <a href="farmer_login.html" class="dropdown-item logout">Logout</a>
        </div>
      </li>
    </ul>
  </nav>

  <div class="container">
    <div class="header-flex">
      <h1 class="page-title">My Profile</h1>
      <button class="btn-edit" type="button"><i class="fa-solid fa-pen-to-square"></i> Edit Profile</button>
    </div>

    <div class="profile-card">
      <div class="user-info-section">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300" class="profile-avatar" alt="Farmer Avatar">
        <div class="user-meta">
          <h2 id="name">Loading...</h2>
          <p>Farmer ID: <span id="farmerId" class="farmer-id-tag"></span></p>
          <p id="memberSince"></p>
          <div style="margin-top: 10px;">
            <span class="risk-indicator"><i class="fa-solid fa-shield-virus"></i> <span id="riskStatus">Health Status: N/A</span></span>
          </div>
        </div>
      </div>

      <div class="info-grid">
        <div class="field-group">
          <label>Email Address</label>
          <div class="data-box" id="email"></div>
        </div>
        <div class="field-group">
          <label>Phone Number</label>
          <div class="data-box" id="phone"></div>
        </div>

        <div class="field-group full-width">
          <label>Farm Address</label>
          <div class="data-box" id="address"></div>
        </div>

        <div class="field-group">
          <label>Farm Name</label>
          <div class="data-box" id="farmName"></div>
        </div>
        <div class="field-group">
          <label>Livestock Category</label>
          <div class="data-box" id="farmType"></div>
        </div>
        <div class="field-group">
          <label>Verification Status</label>
          <div class="data-box" style="color: var(--primary); font-weight: 700;">
            <i class="fa-solid fa-circle-check"></i> Admin Verified
          </div>
        </div>

        <div class="field-group">
          <label>Total Farm Area (Acre)</label>
          <div class="data-box" id="farmArea"></div>
        </div>
        <div class="field-group">
          <label>State</label>
          <div class="data-box" id="state"></div>
        </div>
        <div class="field-group">
          <label>District</label>
          <div class="data-box" id="district"></div>
        </div>
        <div class="field-group">
          <label>Village</label>
          <div class="data-box" id="village"></div>
        </div>
        <div class="field-group">
          <label>Role</label>
          <div class="data-box" id="role"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer" style="background: #020617; padding: 60px 80px 20px; color: #94a3b8; border-top: 1px solid #1e293b;">
  <div style="text-align:center; padding-bottom: 20px; border-bottom: 1px solid #1e293b;">
    <h2 style="color:var(--primary);">Digital Farm</h2>
  </div>
  <p style="text-align:center; padding-top:20px; font-size:12px;">&copy; 2026 Digital Farm | Built for Farmers</p>
</footer>

  <script src="risk_engine.js"></script>
  <script>
    const profileMenuButton = document.getElementById('profileMenuButton');
    const profileDropdown = document.getElementById('profileDropdown');
    const profileImage = document.querySelector('.profile-avatar');
    const profileAvatarSmall = document.querySelector('.profile-avatar-small');

    profileMenuButton.addEventListener('click', function (event) {
      event.stopPropagation();
      profileDropdown.classList.toggle('open');
    });

    document.addEventListener('click', function (event) {
      if (!profileDropdown.contains(event.target) && !profileMenuButton.contains(event.target)) {
        profileDropdown.classList.remove('open');
      }
    });

    document.querySelector('.btn-edit').addEventListener('click', function () {
      window.location.href = 'farmer_edit_profile.html';
    });
    const API_BASE_URL = 'http://localhost:5000/api/v1';
    const getStoredProfilePhotoKey = (profileId) => `profile_photo_${profileId}`;

    const applyStoredPhoto = (profileId) => {
      const storedPhoto = localStorage.getItem(getStoredProfilePhotoKey(profileId));
      if (!storedPhoto) return;

      profileImage.src = storedPhoto;
      profileAvatarSmall.innerText = '';
      profileAvatarSmall.style.backgroundImage = `url('${storedPhoto}')`;
      profileAvatarSmall.style.backgroundSize = 'cover';
      profileAvatarSmall.style.backgroundPosition = 'center';
      profileAvatarSmall.style.backgroundRepeat = 'no-repeat';
      profileAvatarSmall.style.color = 'transparent';
    };

    const applyProfilePhotoUrl = (photoUrl) => {
      if (!photoUrl) return;
      profileImage.src = photoUrl;
      profileAvatarSmall.innerText = '';
      profileAvatarSmall.style.backgroundImage = `url('${photoUrl}')`;
      profileAvatarSmall.style.backgroundSize = 'cover';
      profileAvatarSmall.style.backgroundPosition = 'center';
      profileAvatarSmall.style.backgroundRepeat = 'no-repeat';
      profileAvatarSmall.style.color = 'transparent';
    };

    const setText = (id, value) => {
      document.getElementById(id).innerText = value || 'N/A';
    };

    const formatDate = (value) => {
      if (!value) return 'N/A';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? 'N/A' : date.toLocaleDateString();
    };

    const buildAddress = (profile) => {
      const detailedAddress = [
        profile.address,
        profile.village,
        profile.district,
        profile.state
      ].filter(Boolean);

      return detailedAddress.length ? detailedAddress.join(', ') : 'N/A';
    };

    async function fetchProfile() {
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = 'farmer_login.html';
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/farmers/profile`, {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          throw new Error(result.message || 'Failed to fetch profile');
        }

        const p = result.data;
        const displayName = p.name || 'Farmer';
        const initials = displayName.trim().charAt(0).toUpperCase() || 'F';

        document.querySelector('.profile-name').innerText = `Hello, ${displayName.split(' ')[0]}!`;
        profileAvatarSmall.innerText = initials;
        profileAvatarSmall.style.backgroundImage = '';
        profileAvatarSmall.style.color = '';
        setText('name', displayName);
        setText('farmerId', p.id ? p.id.slice(0, 8).toUpperCase() : null);
        document.getElementById('memberSince').innerText = `Member Since: ${formatDate(p.created_at)}`;
        setText('email', p.email);
        setText('phone', p.phone);
        setText('address', buildAddress(p));
        setText('farmName', p.farm_name);
        setText('farmType', p.farm_type);
        setText('farmArea', p.farm_area);
        setText('state', p.state);
        setText('district', p.district);
        setText('village', p.village);
        setText('role', p.role);
        
        const riskIndicator = document.querySelector('.risk-indicator');
        if (window.DigitalFarmRisk) {
          const summary = window.DigitalFarmRisk.syncOverallRisk();
          if (summary && summary.badge) {
            document.getElementById('riskStatus').innerText = `Health Status: ${summary.level} Risk`;
            riskIndicator.style.background = summary.badge.bg;
            riskIndicator.style.color = summary.badge.color;
            riskIndicator.style.borderColor = summary.badge.color;
          } else {
            document.getElementById('riskStatus').innerText = `Health Status: ${p.health || 'N/A'}`;
          }
        } else {
          document.getElementById('riskStatus').innerText = `Health Status: ${p.health || 'N/A'}`;
        }

        if (p.avatar_url) {
          applyProfilePhotoUrl(p.avatar_url);
        } else if (p.id) {
          applyStoredPhoto(p.id);
        }
      } catch (err) {
        console.error('Profile fetch error:', err);
        alert('Unable to load profile data. Please log in again.');
      }
    }

    fetchProfile();
  </script>

</body>
</html>
