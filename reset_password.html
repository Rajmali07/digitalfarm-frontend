<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Digital Farm</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    :root {
      --primary: #22c55e;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.88);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-dim: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(circle at top right, rgba(34, 197, 94, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.05), transparent);
      color: #f8fafc;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      padding: 38px;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border-top: 4px solid var(--primary);
      text-align: center;
    }

    .card h1 { font-size: 28px; margin-bottom: 10px; }
    .card p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }
    .icon {
      font-size: 38px;
      color: var(--primary);
      margin-bottom: 14px;
    }

    .input-group { text-align: left; margin-top: 22px; }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 15px;
      color: var(--primary);
      font-size: 16px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      outline: none;
      font-size: 14px;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .status.info { display: block; background: rgba(59, 130, 246, 0.12); color: #bfdbfe; }
    .status.success { display: block; background: rgba(34, 197, 94, 0.12); color: #86efac; }
    .status.error { display: block; background: rgba(239, 68, 68, 0.12); color: #fca5a5; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn.primary {
      background: var(--primary);
      color: white;
    }

    .btn.secondary {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="fa-solid fa-key"></i></div>
    <h1>Create New Password</h1>
    <p>Open the reset email, click the secure link, then set a new password here.</p>

    <div id="resetState" class="status info">Waiting for a valid password recovery session...</div>

    <form id="resetPasswordForm">
      <div class="input-group">
        <label for="newPassword">New Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input id="newPassword" type="password" placeholder="Enter new password" minlength="6" required>
        </div>
      </div>

      <div class="input-group">
        <label for="confirmNewPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-shield-halved"></i>
          <input id="confirmNewPassword" type="password" placeholder="Confirm new password" minlength="6" required>
        </div>
      </div>

      <div class="actions">
        <a class="btn secondary" href="farmer_login.html">Back to Login</a>
        <button type="submit" class="btn primary" id="resetSubmitButton">Update Password</button>
      </div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = 'https://ppksvtcjyvtbcrdncvsm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Mz-YMegdeHu08iMHfaIMwQ_61VvS1XE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const resetState = document.getElementById('resetState');
    const resetForm = document.getElementById('resetPasswordForm');
    const submitButton = document.getElementById('resetSubmitButton');
    let recoveryReady = false;

    function setStatus(type, message) {
      resetState.className = `status ${type}`;
      resetState.textContent = message;
    }

    async function activateRecoveryState() {
      const { data } = await supabaseClient.auth.getSession();
      if (data && data.session) {
        recoveryReady = true;
        setStatus('info', 'Recovery session detected. Enter your new password.');
      } else {
        setStatus('error', 'Open this page from the password reset email link. The recovery session is missing or expired.');
      }
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || session) {
        recoveryReady = true;
        setStatus('info', 'Recovery session detected. Enter your new password.');
      }
    });

    resetForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmNewPassword').value;

      if (!recoveryReady) {
        setStatus('error', 'Password recovery session is not active. Use the link from your email again.');
        return;
      }

      if (newPassword.length < 6) {
        setStatus('error', 'New password must be at least 6 characters.');
        return;
      }

      if (newPassword !== confirmPassword) {
        setStatus('error', 'Passwords do not match.');
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = 'Updating...';
      setStatus('info', 'Updating your password securely...');

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) {
          throw error;
        }

        setStatus('success', 'Password updated successfully. You can now sign in with your new password.');
        resetForm.reset();
      } catch (error) {
        console.error(error);
        setStatus('error', error.message || 'Failed to update password.');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Update Password';
      }
    });

    activateRecoveryState().catch((error) => {
      console.error(error);
      setStatus('error', 'Unable to validate the recovery session.');
    });
  </script>
</body>
</html>
