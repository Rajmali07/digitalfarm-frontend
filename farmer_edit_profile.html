<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | Digital Farm</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --bg-slate: #f8fafc;
      --text-dark: #0f172a;
      --text-gray: #64748b;
      --border-color: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-slate); color: var(--text-dark); }

    .navbar {
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 15px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-links { display: flex; list-style: none; align-items: center; gap: 10px; }
    .nav-links a {
      text-decoration: none;
      color: #94a3b8;
      font-size: 14px;
      padding: 8px 20px;
      transition: 0.3s;
    }
    .nav-links a.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 50px;
      font-weight: 600;
    }
    .profile-menu { position: relative; margin-left: 18px; }
    .profile-trigger {
      display: flex;
      align-items: center;
      gap: 14px;
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0;
    }
    .profile-name { font-size: 16px; font-weight: 600; color: #f8fafc; }
    .profile-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.04);
    }
    .profile-dropdown {
      position: absolute;
      top: calc(100% + 18px);
      right: 0;
      width: 270px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
      border: 1px solid #e5e7eb;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      z-index: 1200;
    }
    .profile-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .dropdown-item {
      display: block;
      width: 100%;
      padding: 18px 22px;
      background: white;
      border: none;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      font-size: 16px;
      color: #3f3f46;
      cursor: pointer;
      text-decoration: none;
    }
    .dropdown-item:hover { background: #f8fafc; }
    .dropdown-item.logout { color: #ff3b30; border-bottom: none; }

    .container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 25px; }
    .edit-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
    }

    .avatar-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
    }
    .profile-avatar-preview {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid var(--primary);
      padding: 5px;
      object-fit: cover;
    }
    .upload-label {
      background: #f1f5f9;
      color: var(--text-dark);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-label:hover { background: #e2e8f0; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .full-width { grid-column: span 2; }
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-group label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      background: #ffffff;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      font-size: 15px;
      color: var(--text-dark);
      transition: 0.3s;
      outline: none;
    }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); }
    .form-input:disabled { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }

    .btn-group {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 40px;
      border-top: 1px solid #f1f5f9;
      padding-top: 30px;
    }
    .btn-cancel {
      background: white;
      border: 1px solid var(--border-color);
      color: var(--text-gray);
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
    }
    .btn-save {
      background: var(--primary);
      border: none;
      color: white;
      padding: 12px 35px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }
    .btn-save:hover { background: var(--primary-hover); transform: translateY(-1px); }

    .footer {
      background: #020617;
      padding: 60px 80px 20px;
      color: #94a3b8;
      margin-top: 80px;
      border-top: 1px solid #1e293b;
    }
    .footer-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 40px;
    }
    .footer h3 {
      color: white;
      margin-bottom: 20px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .footer-logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .footer a { text-decoration: none; color: #94a3b8; font-size: 14px; }

    @media (max-width: 900px) {
      .navbar { padding: 15px 20px; flex-direction: column; gap: 15px; }
      .nav-links { flex-wrap: wrap; justify-content: center; }
      .info-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      .footer { padding: 40px 20px 20px; }
      .footer-container { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="farmer_dashboard.html" class="nav-logo"><i class="fa-solid fa-leaf"></i> Digital Farm</a>
    <ul class="nav-links">
      <li><a href="farmer_dashboard.html">Dashboard</a></li>
      <li><a href="farmer_ai_check.html">AI Diagnostic</a></li>
      <li><a href="farmer_add_data.html">Data Entry</a></li>
      <li><a href="farmer_animal_records.html">Records</a></li>
      <li><a href="farmer_biosecurity.html">Biosecurity</a></li>
      <li><a href="farmer_profile.html" class="active">Edit Profile</a></li>
      <li class="profile-menu">
        <button class="profile-trigger" id="profileMenuButton" type="button">
          <span class="profile-name">Hello, Raj!</span>
          <span class="profile-avatar">R</span>
        </button>
        <div class="profile-dropdown" id="profileDropdown">
          <a href="farmer_profile.html" class="dropdown-item">View Profile</a>
          <a href="farmer_setting.html" class="dropdown-item">Settings</a>
          <a href="farmer_login.html" class="dropdown-item logout">Logout</a>
        </div>
      </li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Edit Your Profile</h1>

    <form class="edit-card" id="editProfileForm">
      <div class="avatar-upload">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300" id="previewImg" class="profile-avatar-preview" alt="Avatar">
        <input type="file" id="imageInput" hidden accept="image/*">
        <label for="imageInput" class="upload-label">
          <i class="fa-solid fa-camera"></i> Change Photo
        </label>
      </div>

      <div class="info-grid">
        <div class="field-group">
          <label>Full Name</label>
          <input type="text" class="form-input" value="Rajesh Kumar" required>
        </div>
        <div class="field-group">
          <label>Phone Number</label>
          <input type="tel" class="form-input" value="+91 70671 74287" required>
        </div>
        <div class="field-group full-width">
          <label>Email Address (Primary)</label>
          <input type="email" class="form-input" value="raj@gmail.com" required>
        </div>
        <div class="field-group full-width">
          <label>Farm Address / Location</label>
          <input type="text" class="form-input" value="Village Charoda, Raipur, Chhattisgarh" required>
        </div>
        <div class="field-group">
          <label>Livestock Category</label>
          <select class="form-input">
            <option value="multi" selected>Multi-Livestock Farm</option>
            <option value="cattle">Cattle (Cow/Buffalo)</option>
            <option value="poultry">Poultry (Chicken/Duck)</option>
            <option value="goat-sheep">Goat/Sheep Farm</option>
            <option value="swine">Swine (Pig Farm)</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field-group">
          <label>Total Farm Area (Acres)</label>
          <input type="number" class="form-input" value="4.5" step="0.1">
        </div>
        <div class="field-group">
          <label>Farmer ID (Fixed)</label>
          <input type="text" class="form-input" value="FMR-7782-990-2026" disabled>
        </div>
        <div class="field-group">
          <label>Registration Date</label>
          <input type="text" class="form-input" value="11/07/2025" disabled>
        </div>
      </div>

      <div class="btn-group">
        <a href="farmer_profile.html" class="btn-cancel">Discard Changes</a>
        <button type="submit" class="btn-save">Save & Sync Profile</button>
      </div>
    </form>
  </div>

  <footer class="footer" style="background: #020617; padding: 60px 80px 20px; color: #94a3b8; border-top: 1px solid #1e293b;">
  <div style="text-align:center; padding-bottom: 20px; border-bottom: 1px solid #1e293b;">
    <h2 style="color:var(--primary);">Digital Farm</h2>
  </div>
  <p style="text-align:center; padding-top:20px; font-size:12px;">&copy; 2026 Digital Farm | Built for Farmers</p>
</footer>

  <script>
    const profileMenuButton = document.getElementById('profileMenuButton');
    const profileDropdown = document.getElementById('profileDropdown');
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImg');

    profileMenuButton.addEventListener('click', function (event) {
      event.stopPropagation();
      profileDropdown.classList.toggle('open');
    });

    document.addEventListener('click', function (event) {
      if (!profileDropdown.contains(event.target) && !profileMenuButton.contains(event.target)) {
        profileDropdown.classList.remove('open');
      }
    });

    imageInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          previewImg.setAttribute('src', e.target.result);
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('editProfileForm').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Digital Farm Sync: Profile information has been updated successfully.');
      window.location.href = 'farmer_profile.html';
    });
  </script>

</body>
</html>
